<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">TechNova.</a>
            <nav class="nav-links">
                <a href="#home" class="active">Home</a>
                <a href="#products">Products</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
            <div class="nav-actions">
                <button class="cart-btn" aria-label="Shopping Cart">
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container hero-content">
                <div class="hero-text">
                    <h1>Next-Gen Tech.</h1>
                    <p>Discover our collection.</p>
                    <a href="#products" class="btn btn-primary">Shop Collection</a>
                </div>
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
                        alt="Smartwatch">
                </div>
            </div>
        </section>

        <section id="products" class="products-section">
            <div class="container">
                <div class="section-header">
                    <h2>Trending Products</h2>
                    <p>Explore our latest arrivals.</p>
                </div>

                <div class="product-grid" id="productGrid">
                    <!-- Products will be injected via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <h3>TechNova.</h3>
                <p>Minimalist tech.</p>
            </div>
            <div class="footer-links">
                <div class="link-group">
                    <h4>Shop</h4>
                    <a href="#">All Products</a>
                    <a href="#">New Arrivals</a>
                    <a href="#">Accessories</a>
                </div>
                <div class="link-group">
                    <h4>Support</h4>
                    <a href="#">FAQ</a>
                    <a href="#">Shipping</a>
                    <a href="#">Returns</a>
                </div>
            </div>
        </div>
        <div class="container footer-bottom">
            <p>&copy; 2026 TechNova. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
